<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>VersionLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-sky-400">VersionLink</h1>
        </header>

        <section class="mb-8">
            <label class="block text-sm font-medium mb-2">Modrinth Slugs (One per line)</label>
            <textarea id="modInput" rows="6" 
                class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 font-mono text-sm text-white focus:ring-2 focus:ring-sky-500"
                placeholder="sodium&#10;lithium"></textarea>
            <button type="button" id="submitBtn"
                class="mt-4 bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 px-6 rounded-lg">
                Analyze Compatibility
            </button>
            <div class="mt-2 flex gap-2">
            <input type="file" id="importFile" class="hidden" onchange="handleImport(this)">
            <button onclick="document.getElementById('importFile').click()" class="text-xs text-slate-400 hover:text-white transition-colors">
                Import File...
            </button>
        </div>
        </section>


        <div id="manifestSection" class="hidden mb-6 p-4 bg-slate-900/50 rounded-lg border border-slate-700">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500 mb-3">Mod Manifest</h2>
            <div id="foundList" class="flex flex-wrap gap-2 mb-3"></div>
            <div id="missingSection" class="hidden border-t border-slate-700 pt-3">
                <p class="text-xs text-red-400 font-bold mb-1">Could not find:</p>
                <div id="missingList" class="text-sm text-slate-400 font-mono"></div>
            </div>
        </div>

        <div id="loading" class="hidden text-sky-400">Querying APIs...</div>

        <section id="results" class="hidden space-y-6">
            <div class="flex gap-3 border-t border-slate-700 pt-6">
                <button onclick="exportBasic()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded">
                    Export Slugs (.txt)
                </button>
                <button onclick="exportAdvanced()" class="text-xs bg-sky-900/50 hover:bg-sky-900 text-sky-300 border border-sky-700 px-3 py-2 rounded">
                    Export Advanced (.json)
                </button>
            </div>

            <div id="statusBadge" class="inline-block px-3 py-1 rounded-full text-sm font-bold"></div>
            <div id="configList" class="grid grid-cols-2 gap-2"></div>
            <div id="conflictSection" class="hidden">
                <h2 class="text-xl font-semibold text-red-400">Incompatible Mods</h2>
                <ul id="failedList" class="list-disc list-inside"></ul>
            </div>
        </section>
    </div>

    <script>

        let lastResult = null;

        async function checkCompatibility() {
            const modInput = document.getElementById('modInput');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');

            if (!modInput) {
                console.error("JS: Could not find modInput element");
                return;
            }

            const slugs = modInput.value.split('\n').map(s => s.trim()).filter(s => s !== '');
            console.log("JS: Processing slugs:", slugs);

            if (slugs.length === 0) {
                alert("Please enter at least one mod slug.");
                return;
            }

            loading.classList.remove('hidden');
            results.classList.add('hidden');

            try {
                console.log("JS: Sending Fetch Request...");
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mods: slugs.map(s => ({ platform: 'modrinth', id: s })) })
                });

                const data = await response.json();
                console.log("JS: Received data:", data);

                loading.classList.add('hidden');
                lastResult = data;
                renderResults(data);
            } catch (err) {
                console.error("JS: Fetch Error:", err);
                loading.classList.add('hidden');
            }
        }

        function renderResults(data) {
            const badge = document.getElementById('statusBadge');
            const configList = document.getElementById('configList');
            const failedList = document.getElementById('failedList');
            const results = document.getElementById('results');
            const manifest = document.getElementById('manifestSection');
            const foundList = document.getElementById('foundList');
            const missingSection = document.getElementById('missingSection');
            const missingList = document.getElementById('missingList');
            
            results.classList.remove('hidden');
            manifest.classList.remove('hidden');
            configList.innerHTML = '';
            failedList.innerHTML = '';
            foundList.innerHTML = '';
            missingList.innerHTML = '';

            data.found_mods.forEach(mod => {
                const a = document.createElement('a');
                a.href = mod.url;
                a.target = "_blank";
                a.className = "text-xs bg-slate-800 hover:bg-slate-700 border border-sky-900/50 text-sky-400 px-2 py-1 rounded transition-colors";
                a.innerText = mod.name;
                foundList.appendChild(a);
            });

            if (data.not_found.length > 0) {
                missingSection.classList.remove('hidden');
                missingList.innerText = data.not_found.join(', ');
            } else {
                missingSection.classList.add('hidden');
            }

            badge.innerText = data.status;
            badge.className = data.status === 'Perfect Match' 
                ? 'inline-block px-3 py-1 rounded-full text-sm font-bold bg-green-900 text-green-300'
                : 'inline-block px-3 py-1 rounded-full text-sm font-bold bg-yellow-900 text-yellow-300';

            data.recommended_configs.forEach(conf => {
                const div = document.createElement('div');
                div.className = 'bg-slate-800 border border-slate-700 p-2 rounded text-center';
                div.innerHTML = `<span class="text-sky-300 font-bold">${conf[0]}</span> <span class="text-slate-500">/</span> <span class="capitalize">${conf[1]}</span>`;
                configList.appendChild(div);
            });

            if (data.incompatible_mods && data.incompatible_mods.length > 0) {
                document.getElementById('conflictSection').classList.remove('hidden');
                data.incompatible_mods.forEach(mod => {
                    const li = document.createElement('li');
                    li.innerText = mod;
                    failedList.appendChild(li);
                });
            }
        }

        function exportBasic() {
            if (!lastResult) return;
            const slugs = lastResult.found_mods.map(m => m.name).join('\n');
            downloadFile(slugs, 'modlist.txt', 'text/plain');
        }

        // 2. Advanced Export (JSON Metadata)
        function exportAdvanced() {
            if (!lastResult) return;
            const dataStr = JSON.stringify(lastResult, null, 2);
            downloadFile(dataStr, 'versionlink_advanced.json', 'application/json');
        }

        function downloadFile(content, fileName, contentType) {
            const a = document.createElement("a");
            const file = new Blob([content], { type: contentType });
            a.href = URL.createObjectURL(file);
            a.download = fileName;
            a.click();
        }

        async function handleImport(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                
                try {
                    // Try to parse as JSON (Advanced Format)
                    const data = JSON.parse(content);
                    if (data.found_mods) {
                        // If it's our advanced format, extract the slugs and put them in the textarea
                        const slugs = data.found_mods.map(m => m.name).join('\n');
                        document.getElementById('modInput').value = slugs;
                    }
                } catch (err) {
                    // If JSON fails, treat as plain text (Basic Format)
                    document.getElementById('modInput').value = content.trim();
                }
                
                // Auto-trigger analysis after import
                checkCompatibility();
            };
            reader.readAsText(file);
        }

        // Add event listener manually to be safe
        document.getElementById('submitBtn').addEventListener('click', checkCompatibility);
    </script>
</body>
</html>
